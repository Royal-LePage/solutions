# =========================================================
# Royal LePage Solutions — Decap CMS Configuration
# info.royallepagesolutions.com/admin
# =========================================================

backend:
  name: github
  repo: Royal-LePage/solutions
  branch: main

# Media uploads — stored in assets/images/blog/
media_folder: "assets/images/blog"
public_folder: "/assets/images/blog"

# Editorial workflow — posts save as drafts until approved
publish_mode: editorial_workflow

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "pages/blog/{{slug}}/"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Keep it clear and descriptive. This appears as the page heading and in search results."

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        hint: "The date that will appear on the post."

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Market Updates",      value: "market-updates" }
          - { label: "Agent Spotlights",    value: "agent-spotlights" }
          - { label: "Neighbourhood Guides", value: "neighbourhood-guides" }
          - { label: "Tips",                value: "tips" }
          - { label: "Brokerage News",      value: "brokerage-news" }
        hint: "Choose the category that best fits this post."

      - label: "Excerpt"
        name: "excerpt"
        widget: "text"
        hint: "A short summary (1–2 sentences). Appears on the blog index card and in search engine previews. Keep it under 160 characters."

      - label: "Featured Image"
        name: "image"
        widget: "image"
        required: false
        hint: "Optional. Appears at the top of the post and as the card thumbnail on the blog index. Recommended size: 1200 × 630px."

      - label: "Featured Image Alt Text"
        name: "image_alt"
        widget: "string"
        required: false
        hint: "Describe the image for accessibility (e.g. 'Aerial view of Calgary skyline at sunset'). Required if a featured image is uploaded."

      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Write your post here. Use the toolbar to add headings, bold text, bullet lists, and images."

      - label: "Published"
        name: "published"
        widget: "hidden"
        default: true
