backend:
  name: github
  repo: Royal-LePage/solutions
  branch: main
  base_url: https://rls-github-oauth.rls-solutions.workers.dev
  auth_endpoint: /auth

media_folder: "assets/images/blog"
public_folder: "/assets/images/blog"

publish_mode: editorial_workflow

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Market Updates", value: "market-updates" }
          - { label: "Agent Spotlights", value: "agent-spotlights" }
          - { label: "Neighbourhood Guides", value: "neighbourhood-guides" }
          - { label: "Tips", value: "tips" }
          - { label: "Brokerage News", value: "brokerage-news" }
      - label: "Excerpt"
        name: "excerpt"
        widget: "string"
        hint: "Short summary shown on the blog index page."
      - label: "Featured Image"
        name: "image"
        widget: "image"
        required: false
      - label: "Body"
        name: "body"
        widget: "markdown"
